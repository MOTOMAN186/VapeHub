<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { color: #ff4e00; font-size: 24px; text-transform: uppercase; }
        .container { display: flex; flex-direction: column; gap: 20px; padding-bottom: 50px; }
        .item { background: #252525; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .item img { width: 100%; max-width: 280px; border-radius: 10px; }
        .price { color: #ff4e00; font-size: 22px; font-weight: bold; margin: 10px 0; }
        .buy-btn { background: #ff4e00; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        #confirm-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; padding: 20px; box-sizing: border-box; }
        .check { background: #252525; padding: 20px; border-radius: 15px; border: 2px dashed #ff4e00; margin-top: 20px; text-align: left; white-space: pre-wrap; font-family: monospace; }
        .send-btn { background: #0088cc; color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>VAPE HUB SURGUT</h1>
        <div class="container">
            <div class="item"><img src="IMG_2450.jpeg"><div>HOTSPOT</div><div class="price">500 ₽</div><button class="buy-btn" onclick="showConfirm('HOTSPOT', 500)">Купить</button></div>
            <div class="item"><img src="IMG_2449.jpeg"><div>АЧОНЕТ?</div><div class="price">450 ₽</div><button class="buy-btn" onclick="showConfirm('АЧОНЕТ?', 450)">Купить</button></div>
            <div class="item"><img src="IMG_2445.webp"><div>Монашка</div><div class="price">600 ₽</div><button class="buy-btn" onclick="showConfirm('Монашка', 600)">Купить</button></div>
            <div class="item"><img src="IMG_2448.webp"><div>Pasito 3</div><div class="price">5000 ₽</div><button class="buy-btn" onclick="showConfirm('Pasito 3', 5000)">Купить</button></div>
            <div class="item"><img src="IMG_2451.jpeg"><div>Waka 10k</div><div class="price">1690 ₽</div><button class="buy-btn" onclick="showConfirm('Waka 10k', 1690)">Купить</button></div>
            <div class="item"><img src="IMG_2452.jpeg"><div>Waka 20k</div><div class="price">2290 ₽</div><button class="buy-btn" onclick="showConfirm('Waka 20k', 2290)">Купить</button></div>
            <div class="item"><img src="IMG_2453.webp"><div>Waka 25k</div><div class="price">2490 ₽</div><button class="buy-btn" onclick="showConfirm('Waka 25k', 2490)">Купить</button></div>
            <div class="item"><img src="IMG_2474.jpeg"><div>Pafos 20k</div><div class="price">2590 ₽</div><button class="buy-btn" onclick="showConfirm('Pafos 20k', 2590)">Купить</button></div>
            <div class="item"><img src="IMG_2476.jpeg"><div>Картриджи Lost Mary</div><div class="price">1100 ₽</div><button class="buy-btn" onclick="showConfirm('Lost Mary Cartridges', 1100)">Купить</button></div>
            <div class="item"><img src="IMG_2477.jpeg"><div>Устройство Lost Mary</div><div class="price">1690 ₽</div><button class="buy-btn" onclick="showConfirm('Lost Mary Device', 1690)">Купить</button></div>
        </div>
    </div>

    <div id="confirm-screen">
        <h1>ТВОЙ ЗАКАЗ</h1>
        <div class="check" id="check-info"></div>
        <button class="send-btn" id="send-link-btn">ОТПРАВИТЬ ЗАКАЗ В ЧАТ</button>
        <button style="background:none; color: gray; border:none; margin-top:15px;" onclick="location.reload()">⬅ Назад к покупкам</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showConfirm(name, price) {
            const address = prompt("Укажите адрес доставки в Сургуте:");
            if (!address) return;

            // Обновил текст реквизитов по твоей просьбе
            const message = "🚀 ЗАКАЗ: " + name + 
                            "\n💰 СУММА: " + price + " ₽" + 
                            "\n📍 АДРЕС: " + address + 
                            "\n📱 НОМЕР: +79222490563" + 
                            "\n🏦 БАНК: Т-Банк" + 
                            "\n👤 Евгений Б." + 
                            "\n⚠️ Скиньте скрин оплаты!";
            
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('confirm-screen').style.display = 'block';
            document.getElementById('check-info').innerText = message;

            const botUrl = "https://t.me/VapeHub_Surgut_bot?text=" + encodeURIComponent(message);
            
            document.getElementById('send-link-btn').onclick = function() {
                tg.openTelegramLink(botUrl);
                setTimeout(() => {
                    tg.close();
                }, 2000);
            };
        }
    </script>
</body>
</html>
