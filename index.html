<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .item { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ff4e00; }
        button { background: #ff4e00; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; }
        h1 { color: #ff4e00; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>VAPE HUB</h1>
    <div class="item">
        <p>XROS 4 — 2800 ₽</p>
        <button onclick="window.Telegram.WebApp.sendData('Заказ: XROS 4'); window.Telegram.WebApp.close();">Выбрать</button>
    </div>
    <div class="item">
        <p>Husky Salt — 550 ₽</p>
        <button onclick="window.Telegram.WebApp.sendData('Заказ: Husky'); window.Telegram.WebApp.close();">Выбрать</button>
    </div>
    <script>window.Telegram.WebApp.expand();</script>
</body>
</html>
