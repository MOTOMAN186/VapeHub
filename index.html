<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: -apple-system, sans-serif; padding: 20px; margin: 0; }
        h1 { color: #ff4e00; margin-bottom: 20px; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .item { background: #252525; padding: 15px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .item img { width: 100%; max-width: 280px; border-radius: 10px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .price { color: #ff4e00; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        button { background: #ff4e00; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); background: #e64600; }
    </style>
</head>
<body>
    <h1>VAPE HUB</h1>
    <div class="container">
        <div class="item">
            <img src="IMG_2450.jpeg" alt="HOTSPOT">
            <div class="title">Жидкость HOTSPOT</div>
            <div class="price">500 ₽</div>
            <button onclick="sendOrder('HOTSPOT (500₽)')">Выбрать</button>
        </div>

        <div class="item">
            <img src="IMG_2449.jpeg" alt="АЧОНЕТ?">
            <div class="title">Жидкость «АЧОНЕТ?»</div>
            <div class="price">450 ₽</div>
            <button onclick="sendOrder('АЧОНЕТ? (450₽)')">Выбрать</button>
        </div>

        <div class="item">
            <img src="IMG_2445.webp" alt="Монашка">
            <div class="title">Жидкость Монашка</div>
            <div class="price">600 ₽</div>
            <button onclick="sendOrder('Монашка (600₽)')">Выбрать</button>
        </div>

        <div class="item">
            <img src="IMG_2448.webp" alt="Smoant Pasito 3">
            <div class="title">Smoant Pasito 3</div>
            <div class="price">5000 ₽</div>
            <button onclick="sendOrder('Pasito 3 (5000₽)')">Выбрать</button>
        </div>

        <div class="item">
            <img src="IMG_2453.webp" alt="Waka 25k">
            <div class="title">Waka 25k</div>
            <div class="price">2490 ₽</div>
            <button onclick="sendOrder('Waka 25k (2490₽)')">Выбрать</button>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendOrder(item) {
            tg.sendData('Заказ: ' + item);
            tg.close();
        }
    </script>
</body>
</html>
