<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: -apple-system, sans-serif; padding: 20px; margin: 0; }
        h1 { color: #ff4e00; margin-bottom: 20px; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .container { display: flex; flex-direction: column; gap: 20px; padding-bottom: 50px; }
        .item { background: #252525; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .item img { width: 100%; max-width: 280px; border-radius: 10px; margin-bottom: 12px; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .price { color: #ff4e00; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        button { background: #ff4e00; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>VAPE HUB SURGUT</h1>
    <div class="container">
        <div class="item"><img src="IMG_2450.jpeg"><div class="title">Жидкость HOTSPOT</div><div class="price">500 ₽</div><button onclick="order('HOTSPOT', 500)">Купить</button></div>
        <div class="item"><img src="IMG_2449.jpeg"><div class="title">Жидкость «АЧОНЕТ?»</div><div class="price">450 ₽</div><button onclick="order('АЧОНЕТ?', 450)">Купить</button></div>
        <div class="item"><img src="IMG_2445.webp"><div class="title">Жидкость Монашка</div><div class="price">600 ₽</div><button onclick="order('Монашка', 600)">Купить</button></div>
        <div class="item"><img src="IMG_2448.webp"><div class="title">Smoant Pasito 3</div><div class="price">5000 ₽</div><button onclick="order('Pasito 3', 5000)">Купить</button></div>
        <div class="item"><img src="IMG_2451.jpeg"><div class="title">Waka 10k</div><div class="price">1690 ₽</div><button onclick="order('Waka 10k', 1690)">Купить</button></div>
        <div class="item"><img src="IMG_2452.jpeg"><div class="title">Waka 20k</div><div class="price">2290 ₽</div><button onclick="order('Waka 20k', 2290)">Купить</button></div>
        <div class="item"><img src="IMG_2453.webp"><div class="title">Waka 25k</div><div class="price">2490 ₽</div><button onclick="order('Waka 25k', 2490)">Купить</button></div>
        <div class="item"><img src="IMG_2474.jpeg"><div class="title">Pafos 20k</div><div class="price">2590 ₽</div><button onclick="order('Pafos 20k', 2590)">Купить</button></div>
        <div class="item"><img src="IMG_2476.jpeg"><div class="title">Картриджи Lost Mary</div><div class="price">1100 ₽</div><button onclick="order('Lost Mary Cartridges', 1100)">Купить</button></div>
        <div class="item"><img src="IMG_2477.jpeg"><div class="title">Устройство Lost Mary</div><div class="price">1690 ₽</div><button onclick="order('Lost Mary Device', 1690)">Купить</button></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function order(name, price) {
            const address = prompt("Укажите адрес доставки в Сургуте:");
            
            if (address) {
                const text = "🚀 ЗАКАЗ: " + name + "\n" +
                             "💰 СУММА: " + price + " ₽\n" +
                             "📍 АДРЕС: " + address + "\n" +
                             "💳 КАРТА: 89222490553 (Т-Банк)\n" +
                             "⚠️ Скиньте скриншот оплаты!";
                
                // Хитрый способ: открываем ссылку, которая подставит текст в чат
                const botUsername = "VapeHub_Surgut_bot"; // Твой юзернейм
                const encodedText = encodeURIComponent(text);
                
                // Эта ссылка закрывает WebApp и открывает чат с готовым текстом
                window.location.href = "https://t.me/" + botUsername + "?text=" + encodedText;
                
                // На всякий случай дублируем в буфер обмена
                navigator.clipboard.writeText(text);
                
                setTimeout(() => { tg.close(); }, 500);
            }
        }
    </script>
</body>
</html>
